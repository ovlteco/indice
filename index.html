: "VRN", "PD": "V", "PROVEEDOR": "SIN ASIGNAR", "DIRECCION EDIFICIO": "PERON EVA ,AV. 2650"}, {"CENTRAL": "VRN", "PD": "V", "PROVEEDOR": "SIN ASIGNAR", "DIRECCION EDIFICIO": "BALBASTRO 2887"}, {"CENTRAL": "RDO", "PD": "K", "PROVEEDOR": "SIN ASIGNAR", "DIRECCION EDIFICIO": "MONTE ,PJE. 6640"}, {"CENTRAL": "RDO", "PD": "K", "PROVEEDOR": "SIN ASIGNAR", "DIRECCION EDIFICIO": "PERON EVA ,AV. 6995"}, {"CENTRAL": "RDO", "PD": "K", "PROVEEDOR": "SIN ASIGNAR", "DIRECCION EDIFICIO": "PERON EVA ,AV. 6705"}, {"CENTRAL": "RDO", "PD": "T", "PROVEEDOR": "SIN ASIGNAR", "DIRECCION EDIFICIO": "B. LUGANO 12 EDIFICIO 54"}, {"CENTRAL": "RDO", "PD": "T", "PROVEEDOR": "SIN ASIGNAR", "DIRECCION EDIFICIO": "B. LUGANO 12 EDIFICIO 36"}, {"CENTRAL": "ORL", "PD": "G", "PROVEEDOR": "OPTICAL POWER", "DIRECCION EDIFICIO": "USPALLATA 2989"}, {"CENTRAL": "ORL", "PD": "G", "PROVEEDOR": "OPTICAL POWER", "DIRECCION EDIFICIO": "ALAGON 305"}, {"CENTRAL": "ORL", "PD": "G", "PROVEEDOR": "OPTICAL POWER", "DIRECCION EDIFICIO": "TROLE 233"}, {"CENTRAL": "CEN", "PD": "D", "PROVEEDOR": "OPTICAL POWER", "DIRECCION EDIFICIO": "YRIGOYEN HIPOLITO 1835"}, {"CENTRAL": "CEN", "PD": "D", "PROVEEDOR": "OPTICAL POWER", "DIRECCION EDIFICIO": "SARANDI 445"}, {"CENTRAL": "CEN", "PD": "D", "PROVEEDOR": "OPTICAL POWER", "DIRECCION EDIFICIO": "SARANDI 269"}];
        const allProviders = ["ZUMAF", "SIN ASIGNAR", "CAINLER", "FIBRAYTEL", "OPTICAL POWER", "LAVTEL", "TARIG", "INTERSA", "INTERNORTE", "HEISA", "300NET", "WORKVISION", "GAES", "GM SYSTEM"];
        
        let db = null;
        let completedDataGlobal = [];
        
        function initializeFirebase() {
            try {
                const app = firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("Firebase inicializado en el índice.");
                setupFirestoreListeners();
            } catch (e) {
                console.error("Error inicializando Firebase:", e);
            }
        }
        
        function setupFirestoreListeners() {
            const providerDataCache = {};
            
            allProviders.forEach(providerName => {
                const collectionName = providerName.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
                const collectionRef = db.collection(collectionName);
                
                collectionRef.orderBy("timestamp", "desc").onSnapshot(snapshot => {
                    console.log(`Datos recibidos de: ${collectionName}`);
                    const providerDocs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    providerDataCache[collectionName] = providerDocs;
                    
                    // Unificar todos los datos de los proveedores
                    completedDataGlobal = Object.values(providerDataCache).flat();
                    updateGlobalStats();
                }, error => {
                    console.error(`Error al obtener datos de ${collectionName}: `, error);
                });
            });
        }
        
        function updateGlobalStats() {
            // Si los elementos no existen, salir sin error
            const centralFilterEl = document.getElementById('filterCentral');
            const pdFilterEl = document.getElementById('filterPd');
            const proveedorFilterEl = document.getElementById('filterProveedor');
            if (!centralFilterEl || !pdFilterEl || !proveedorFilterEl) return;
            
            const centralFilter = centralFilterEl.value;
            const pdFilter = pdFilterEl.value;
            const proveedorFilter = proveedorFilterEl.value;
            
            const filtered = allData.filter(item => {
                const matchCentral = !centralFilter || item.CENTRAL === centralFilter;
                const matchPd = !pdFilter || item.PD === pdFilter;
                const matchProveedor = !proveedorFilter || item.PROVEEDOR === proveedorFilter;
                return matchCentral && matchPd && matchProveedor;
            });
            
            // Calcular cuántos de los filtrados están completados
            const completedFiltered = filtered.filter(item => 
                completedDataGlobal.some(c => c.id === item['DIRECCION EDIFICIO'])
            );
            
            const total = filtered.length;
            const completed = completedFiltered.length;
            const pending = total - completed;
            const progress = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            // Actualizar elementos solo si existen
            const pendingEl = document.getElementById('globalPending');
            const completedEl = document.getElementById('globalCompleted');
            const totalEl = document.getElementById('globalTotal');
            const progressEl = document.getElementById('globalProgress');
            const progressBarEl = document.getElementById('globalProgressBar');
            
            if (pendingEl) pendingEl.textContent = pending;
            if (completedEl) completedEl.textContent = completed;
            if (totalEl) totalEl.textContent = total;
            if (progressEl) progressEl.textContent = progress + '%';
            if (progressBarEl) progressBarEl.style.width = progress + '%';
        }
        
        function searchAddresses() {
            const searchTerm = document.getElementById('searchAddresses').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('addressResults');
            const resultsList = document.getElementById('addressResultsList');
            const resultCount = document.getElementById('addressResultCount');
            
            if (!searchTerm || searchTerm.length < 3) {
                resultsContainer.classList.add('hidden');
                return;
            }
            
            // Buscar en todos los edificios
            const results = allData.filter(item => {
                const direccion = (item['DIRECCION EDIFICIO'] || '').toLowerCase();
                return direccion.includes(searchTerm);
            }).map(item => {
                // Verificar si está completado
                const completado = completedDataGlobal.find(c => c.id === item['DIRECCION EDIFICIO']);
                return {
                    ...item,
                    estado: completado ? 'COMPLETADO' : 'PENDIENTE',
                    causal: completado?.causal || '',
                    driveFolderUrl: completado?.driveFolderUrl || ''
                };
            });
            
            resultCount.textContent = results.length;
            
            if (results.length === 0) {
                resultsList.innerHTML = '<p class="text-gray-500 text-center p-4">No se encontraron coincidencias.</p>';
            } else {
                resultsList.innerHTML = results.map(item => {
                    const estadoBadgeClass = item.estado === 'COMPLETADO' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800';
                    const estadoIcon = item.estado === 'COMPLETADO' ? '✅' : '⏳';
                    const causalText = item.causal ? `<div class="mt-1 text-xs text-gray-600"><strong>Causal:</strong> ${item.causal}</div>` : '';
                    const driveLink = item.driveFolderUrl ? `<a href="${item.driveFolderUrl}" target="_blank" class="text-blue-600 hover:underline text-xs">📁 Ver carpeta</a>` : '';
                    
                    return `
                        <div class="bg-white border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                            <div class="flex items-start justify-between mb-2">
                                <h4 class="font-bold text-gray-800">${item['DIRECCION EDIFICIO']}</h4>
                                <span class="badge ${estadoBadgeClass} ml-2">${estadoIcon} ${item.estado}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-sm">
                                <div><span class="text-gray-600">Proveedor:</span> <span class="font-semibold text-blue-700">${item.PROVEEDOR}</span></div>
                                <div><span class="text-gray-600">Central:</span> <span class="font-medium">${item.CENTRAL || 'N/A'}</span></div>
                                <div><span class="text-gray-600">PD:</span> <span class="font-medium">${item.PD || 'N/A'}</span></div>
                                <div><span class="text-gray-600">NAP:</span> <span class="font-medium font-mono text-xs">${item.NAP || 'N/A'}</span></div>
                            </div>
                            ${causalText}
                            ${driveLink}
                        </div>
                    `;
                }).join('');
            }
            
            resultsContainer.classList.remove('hidden');
        }
        
        function populateGlobalFilters() {
            const centralSelect = document.getElementById('filterCentral');
            const pdSelect = document.getElementById('filterPd');
            const proveedorSelect = document.getElementById('filterProveedor');
            
            // Si los elementos no existen, salir sin error
            if (!centralSelect || !pdSelect || !proveedorSelect) return;
            
            const centrals = [...new Set(allData.map(d => d.CENTRAL).filter(Boolean))].sort();
            const pds = [...new Set(allData.map(d => d.PD).filter(Boolean))].sort();
            const proveedores = [...new Set(allData.map(d => d.PROVEEDOR).filter(Boolean))].sort();
            
            centrals.forEach(c => centralSelect.innerHTML += `<option value="${c}">${c}</option>`);
            pds.forEach(p => pdSelect.innerHTML += `<option value="${p}">${p}</option>`);
            proveedores.forEach(pr => proveedorSelect.innerHTML += `<option value="${pr}">${pr}</option>`);
            
            centralSelect.addEventListener('change', updateGlobalStats);
            pdSelect.addEventListener('change', updateGlobalStats);
            proveedorSelect.addEventListener('change', updateGlobalStats);
        }
        
        function renderProviders(filter = '') {
            const grid = document.getElementById('providerGrid');
            const lowerFilter = filter.toLowerCase();
            
            const filtered = providers.filter(p => 
                p.name.toLowerCase().includes(lowerFilter)
            );
            
            document.getElementById('providerCount').textContent = filtered.length;
            document.getElementById('totalProviders').textContent = providers.length;
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">No se encontraron proveedores</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(p => `
                <a href="${p.link}" class="provider-card block bg-white border-2 border-gray-200 rounded-xl p-5 hover:border-blue-500">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-lg text-gray-800">${p.name}</h3>
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-600">Edificios:</span>
                            <span class="stat-badge bg-blue-100 text-blue-700">${p.count}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }
        
        document.getElementById('searchProviders').addEventListener('input', (e) => {
            renderProviders(e.target.value);
        });
        
        populateGlobalFilters();
        initializeFirebase();
        renderProviders();
        
        // Configurar búsqueda de direcciones
        const searchInput = document.getElementById('searchAddresses');
        if (searchInput) {
            searchInput.addEventListener('input', searchAddresses);
        }
    </script>
